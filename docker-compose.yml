version: '3.8'

services:
  mynginx_container:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - myapp_container
    networks:
      - vzeta_network

  myapp_container:
    build: ./app
    environment:
      - DB_HOST=db_container
      - DB_NAME=vzetadb
      - DB_USER=admin
      - DB_PASS=secret123
    depends_on:
      - db_container
    networks:
      - vzeta_network

  db_container:
    image: postgres:13
    environment:
      - POSTGRES_DB=vzetadb
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret123
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - vzeta_network

networks:
  vzeta_network:
    driver: bridge

volumes:
  db_data:
